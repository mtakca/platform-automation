---
# Myapp Services HA Playbook
# Deploys Keepalived on Redis, MinIO, and PostgreSQL clusters

- name: Deploy Keepalived for Redis HA
  hosts: redis
  become: yes
  tasks:
    - name: Install Keepalived
      apt:
        name: keepalived
        state: present
        update_cache: yes

    - name: Configure Keepalived for Redis
      copy:
        dest: /etc/keepalived/keepalived.conf
        content: |
          global_defs {
              router_id REDIS_{{ inventory_hostname_short }}
          }

          vrrp_script chk_redis {
              script "redis-cli ping"
              interval 2
              weight 2
          }

          vrrp_instance VI_REDIS {
              state {{ 'MASTER' if keepalived_priority == 100 else 'BACKUP' }}
              interface {{ keepalived_interface | default('eth0') }}
              virtual_router_id {{ keepalived_vrid }}
              priority {{ keepalived_priority }}
              advert_int 1

              authentication {
                  auth_type PASS
                  auth_pass redis_ha
              }

              virtual_ipaddress {
                  {{ keepalived_vip }}
              }

              track_script {
                  chk_redis
              }
          }
      notify: restart keepalived

    - name: Enable Keepalived
      service:
        name: keepalived
        state: started
        enabled: yes

  handlers:
    - name: restart keepalived
      service:
        name: keepalived
        state: restarted

