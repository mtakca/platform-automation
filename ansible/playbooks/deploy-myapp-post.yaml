---
# TenantB Kubernetes Cluster - Post-Deployment Playbook
# Run this after Kubespray completes successfully
# Usage: ansible-playbook playbooks/deploy-myapp-post.yaml -i inventories/uat-myapp/uat-myapp.34.myapp.yaml

- name: Post K8s Setup on First Controller
  hosts: k8s-controller[0]
  become: true
  vars:
    kubeconfig_path: /etc/kubernetes/admin.conf
    longhorn_version: "1.10.1"
    longhorn_data_path: /mnt/data01/longhorn
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  tasks:
    - name: Wait for K8s API to be ready
      ansible.builtin.command: kubectl get nodes
      register: kubectl_nodes
      retries: 30
      delay: 10
      until: kubectl_nodes.rc == 0
      changed_when: false

    - name: Create Longhorn namespace
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: longhorn-system

    - name: Add Longhorn Helm repository
      kubernetes.core.helm_repository:
        name: longhorn
        repo_url: https://charts.longhorn.io

    - name: Install Longhorn via Helm
      kubernetes.core.helm:
        kubeconfig: "{{ kubeconfig_path }}"
        name: longhorn
        chart_ref: longhorn/longhorn
        chart_version: "{{ longhorn_version }}"
        release_namespace: longhorn-system
        create_namespace: true
        values:
          persistence:
            defaultClassReplicaCount: 2
            reclaimPolicy: Retain
          defaultSettings:
            defaultDataPath: "{{ longhorn_data_path }}"

    - name: Wait for Longhorn pods to be ready
      ansible.builtin.command: >
        kubectl -n longhorn-system wait --for=condition=ready pod
        -l app=longhorn-manager --timeout=300s
      register: longhorn_wait
      retries: 5
      delay: 30
      until: longhorn_wait.rc == 0
      changed_when: false

    - name: Verify Longhorn StorageClass
      ansible.builtin.command: kubectl get storageclass longhorn
      register: sc_check
      changed_when: false

    - name: Display Longhorn status
      ansible.builtin.debug:
        msg: "Longhorn installed successfully. StorageClass: {{ sc_check.stdout }}"
