---
# TenantB Kubernetes Cluster - Pre-Deployment Playbook
# Run this after Terraform apply and before Kubespray
# Usage: ansible-playbook playbooks/deploy-myapp-pre.yaml -i inventories/uat-myapp/uat-myapp.34.myapp.yaml

- name: Prepare NFS Server
  hosts: nfs
  become: true
  roles:
    - role: nfs-server
      vars:
        nfs_export_path: /mnt/data01/nfs
        nfs_network: "10.0.X.X/24"

- name: Prepare All K8s Nodes
  hosts: k8s-controller:k8s-worker
  become: true
  tasks:
    - name: Ensure /mnt/data01 directory exists
      ansible.builtin.file:
        path: /mnt/data01
        state: directory
        mode: "0755"

    - name: Install required packages for Kubespray
      ansible.builtin.apt:
        name:
          - python3
          - python3-pip
          - python3-venv
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: true

    - name: Load required kernel modules
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter
        - nf_conntrack

    - name: Persist kernel modules
      ansible.builtin.lineinfile:
        path: /etc/modules-load.d/k8s.conf
        line: "{{ item }}"
        create: true
        mode: "0644"
      loop:
        - overlay
        - br_netfilter
        - nf_conntrack

    - name: Configure sysctl for Kubernetes
      ansible.posix.sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        sysctl_file: /etc/sysctl.d/99-kubernetes.conf
        reload: true
      loop:
        - { name: "net.bridge.bridge-nf-call-iptables", value: "1" }
        - { name: "net.bridge.bridge-nf-call-ip6tables", value: "1" }
        - { name: "net.ipv4.ip_forward", value: "1" }
        - { name: "vm.swappiness", value: "0" }

    - name: Disable swap
      ansible.builtin.command: swapoff -a
      changed_when: false

    - name: Remove swap from fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: ".*swap.*"
        state: absent

- name: Configure NFS Client on Workers (Optional - if using NFS instead of Longhorn)
  hosts: k8s-worker
  become: true
  tasks:
    - name: Install NFS client
      ansible.builtin.apt:
        name: nfs-common
        state: present
