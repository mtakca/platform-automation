---
# Deploy ExternalDNS to Kubernetes
# Integrates with Bind9 via RFC2136 dynamic updates

- name: Deploy ExternalDNS
  hosts: kube_control_plane[0]
  become: true
  vars:
    # Fallback defaults if environment variables not defined
    externaldns_namespace: "kube-system"
  tasks:
    - name: Set DNS and domain variables
      ansible.builtin.set_fact:
        dns_ip: "{{ hostvars[groups['dns'][0]]['ansible_host'] | default('10.0.X.X') }}"
        domain: "{{ base_domain | default('example.com') }}"
        cluster: "{{ cluster_name | default('uat-myapp-cluster') }}"
    - name: Add external-dns Helm repo
      ansible.builtin.shell: |
        helm repo add bitnami https://charts.bitnami.com/bitnami
        helm repo update
      changed_when: false

    - name: Get TSIG key from DNS server
      ansible.builtin.shell: |
        sshpass -p '{{ ansible_password }}' ssh -o StrictHostKeyChecking=no {{ ansible_user | default('admin') }}@{{ dns_ip }} "sudo cat /etc/bind/keys/externaldns-key.key" | grep secret | awk '{print $2}' | tr -d '";'
      register: tsig_secret
      delegate_to: localhost
      become: false
      vars:
        ansible_password: "{{ vault_default_password | default('CHANGE_ME') }}"

    - name: Create ExternalDNS secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: externaldns-rfc2136
            namespace: "{{ externaldns_namespace }}"
          type: Opaque
          stringData:
            rfc2136_tsig_secret: "{{ tsig_secret.stdout }}"

    - name: Deploy ExternalDNS Deployment
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: external-dns
            namespace: "{{ externaldns_namespace }}"
            labels:
              app.kubernetes.io/name: external-dns
          spec:
            replicas: 1
            selector:
              matchLabels:
                app.kubernetes.io/name: external-dns
            template:
              metadata:
                labels:
                  app.kubernetes.io/name: external-dns
              spec:
                serviceAccountName: external-dns
                containers:
                  - name: external-dns
                    image: registry.k8s.io/external-dns/external-dns:v0.14.0
                    args:
                      - --provider=rfc2136
                      - --rfc2136-host={{ dns_ip }}
                      - --rfc2136-port=53
                      - --rfc2136-zone={{ domain }}
                      - --rfc2136-tsig-keyname=externaldns-key
                      - --rfc2136-tsig-secret-alg=hmac-sha256
                      - --rfc2136-tsig-axfr
                      - --rfc2136-min-ttl=300s
                      - --source=ingress
                      - --source=service
                      - --policy=sync
                      - --txt-owner-id={{ cluster }}
                      - --domain-filter={{ domain }}
                      - --log-format=text
                      - --log-level=info
                    env:
                      - name: EXTERNAL_DNS_RFC2136_TSIG_SECRET
                        valueFrom:
                          secretKeyRef:
                            name: externaldns-rfc2136
                            key: rfc2136_tsig_secret
                    resources:
                      requests:
                        cpu: 100m
                        memory: 128Mi
                      limits:
                        cpu: 500m
                        memory: 256Mi

    - name: Create ExternalDNS ServiceAccount
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: external-dns
            namespace: "{{ externaldns_namespace }}"

    - name: Create ExternalDNS ClusterRole
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRole
          metadata:
            name: external-dns
          rules:
            - apiGroups: [""]
              resources: ["services", "endpoints", "pods"]
              verbs: ["get", "watch", "list"]
            - apiGroups: ["extensions", "networking.k8s.io"]
              resources: ["ingresses"]
              verbs: ["get", "watch", "list"]
            - apiGroups: [""]
              resources: ["nodes"]
              verbs: ["list", "watch"]

    - name: Create ExternalDNS ClusterRoleBinding
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: external-dns
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: external-dns
          subjects:
            - kind: ServiceAccount
              name: external-dns
              namespace: "{{ externaldns_namespace }}"

    - name: Verify ExternalDNS deployment
      ansible.builtin.shell: |
        kubectl get pods -n {{ externaldns_namespace }} -l app.kubernetes.io/name=external-dns
      register: externaldns_pods
      changed_when: false

    - name: Show ExternalDNS status
      ansible.builtin.debug:
        msg: "{{ externaldns_pods.stdout_lines }}"
