---
# OPNsense UAT Internet Access Rules via SSH
# Tüm UAT segmentleri (10.0.X.X/16) için outbound internet erişimi
# Usage: ansible-playbook playbooks/opnsense-uat-internet-rules.yaml -i inventories/uat/opnsense/hosts.yaml

- name: Configure OPNsense Firewall Rules via SSH
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    opnsense_host: "10.0.X.X"
    opnsense_user: "root"
    uat_cidr: "10.0.X.X/16"

  tasks:
    - name: Backup current config
      ansible.builtin.shell: |
        ssh -o StrictHostKeyChecking=no {{ opnsense_user }}@{{ opnsense_host }} \
          "cp /conf/config.xml /conf/config.xml.bak.$(date +%Y%m%d%H%M%S)"
      register: backup_result
      changed_when: true

    - name: Create firewall rules XML snippet
      ansible.builtin.copy:
        dest: /tmp/opnsense_rules.xml
        content: |
          <!-- UAT Internet Access Rules - Generated by Ansible -->
          <rule>
            <type>pass</type>
            <interface>opt1,opt2,opt3,opt4,opt5</interface>
            <ipprotocol>inet</ipprotocol>
            <statetype>keep state</statetype>
            <direction>in</direction>
            <quick>1</quick>
            <source>
              <network>{{ uat_cidr }}</network>
            </source>
            <destination>
              <any>1</any>
            </destination>
            <descr>UAT-ALL-SEGMENTS-INTERNET-ACCESS</descr>
            <log>0</log>
          </rule>

    - name: Check if rule already exists
      ansible.builtin.shell: |
        ssh -o StrictHostKeyChecking=no {{ opnsense_user }}@{{ opnsense_host }} \
          "grep -c 'UAT-ALL-SEGMENTS-INTERNET-ACCESS' /conf/config.xml || echo 0"
      register: rule_exists
      changed_when: false

    - name: Add firewall rule via sed
      ansible.builtin.shell: |
        ssh -o StrictHostKeyChecking=no {{ opnsense_user }}@{{ opnsense_host }} << 'ENDSSH'
        # Check if rule exists
        if grep -q "UAT-ALL-SEGMENTS-INTERNET-ACCESS" /conf/config.xml; then
          echo "Rule already exists, skipping..."
          exit 0
        fi

        # Add pass rule for all UAT segments before </filter>
        sed -i '' '/<\/filter>/i\
        <rule>\
          <type>pass</type>\
          <interface>opt1,opt2,opt3,opt4,opt5</interface>\
          <ipprotocol>inet</ipprotocol>\
          <statetype>keep state</statetype>\
          <direction>in</direction>\
          <quick>1</quick>\
          <source>\
            <network>10.0.X.X/16</network>\
          </source>\
          <destination>\
            <any>1</any>\
          </destination>\
          <descr>UAT-ALL-SEGMENTS-INTERNET-ACCESS</descr>\
          <log>0</log>\
        </rule>
        ' /conf/config.xml
        ENDSSH
      when: rule_exists.stdout | int == 0
      register: add_rule_result

    - name: Check outbound NAT mode
      ansible.builtin.shell: |
        ssh -o StrictHostKeyChecking=no {{ opnsense_user }}@{{ opnsense_host }} \
          "grep -o '<mode>[^<]*</mode>' /conf/config.xml | head -1 || echo '<mode>automatic</mode>'"
      register: nat_mode
      changed_when: false

    - name: Display NAT mode
      ansible.builtin.debug:
        msg: "Current NAT mode: {{ nat_mode.stdout }}"

    - name: Apply configuration changes
      ansible.builtin.shell: |
        ssh -o StrictHostKeyChecking=no {{ opnsense_user }}@{{ opnsense_host }} \
          "configctl filter reload && configctl interface reload all"
      register: reload_result
      changed_when: true

    - name: Verify rules loaded
      ansible.builtin.shell: |
        ssh -o StrictHostKeyChecking=no {{ opnsense_user }}@{{ opnsense_host }} \
          "pfctl -sr | grep -i '10.0.X.X/16' || echo 'Rule not found in pfctl'"
      register: verify_result

    - name: Display verification
      ansible.builtin.debug:
        msg: "{{ verify_result.stdout_lines }}"
