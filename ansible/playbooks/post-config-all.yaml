---
# Post-Configuration Playbook for All UAT VMs
# Applies: Common config, MOTD, Disk mounts
# Usage: ansible-playbook -i inventories/uat/combined_hosts.yaml playbooks/post-config-all.yaml

- name: Post-Configuration for All UAT VMs
  hosts: all
  become: true
  gather_facts: true
  vars:
    environment_name: "UAT"
    common_timezone: "Europe/Istanbul"
    common_packages:
      - curl
      - wget
      - vim
      - htop
      - iotop
      - net-tools
      - dnsutils
      - chrony
      - jq
      - unzip
      - python3-pip
      - gnupg
      - lsb-release
      - ca-certificates

  tasks:
    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install common packages
      apt:
        name: "{{ common_packages }}"
        state: present

    - name: Set timezone
      timezone:
        name: "{{ common_timezone }}"

    - name: Ensure Chrony is installed and running
      service:
        name: chrony
        state: started
        enabled: true

    - name: Deploy EXAMPLE MOTD banner
      copy:
        dest: /etc/motd
        mode: "0644"
        content: |
          ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó  ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēó     
          ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēź‚ēĚ‚Ėą‚Ėą‚ēĎ     
          ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó  ‚Ėą‚Ėą‚ēĎ     
          ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēĚ ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēĚ ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēĚ  ‚Ėą‚Ėą‚ēĎ     
          ‚Ėą‚Ėą‚ēĎ     ‚Ėą‚Ėą‚ēĎ  ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ     ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó
          ‚ēö‚ēź‚ēĚ     ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēĚ‚ēö‚ēź‚ēĚ     ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ

          Environment: {{ environment_name }}
          Hostname:    {{ inventory_hostname }}
          IP Address:  {{ ansible_host }}

          Managed by Ansible
          ===========================================================

    - name: Remove default Ubuntu MOTD scripts
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/update-motd.d/10-help-text
        - /etc/update-motd.d/50-motd-news
        - /etc/update-motd.d/91-release-upgrade
      ignore_errors: true

    - name: Configure journald for persistence
      lineinfile:
        path: /etc/systemd/journald.conf
        regexp: "^Storage="
        line: "Storage=persistent"

    - name: Restart journald
      service:
        name: systemd-journald
        state: restarted

    # Disk mounting section
    - name: Check for /dev/sdb
      stat:
        path: /dev/sdb
      register: sdb_exists

    - name: Check if /mnt/data01 already mounted
      shell: mount | grep -q "/mnt/data01"
      register: data01_mounted
      failed_when: false
      changed_when: false

    - name: Check if /dev/sdb has filesystem
      shell: blkid /dev/sdb
      register: sdb_has_fs
      failed_when: false
      changed_when: false
      when: sdb_exists.stat.exists

    - name: Create XFS filesystem on /dev/sdb
      community.general.filesystem:
        dev: /dev/sdb
        fstype: xfs
        force: false
      when:
        - sdb_exists.stat.exists
        - sdb_has_fs.rc != 0
        - data01_mounted.rc != 0

    - name: Create /mnt/data01 directory
      file:
        path: /mnt/data01
        state: directory
        owner: root
        group: root
        mode: "0755"
      when: sdb_exists.stat.exists

    - name: Mount /dev/sdb to /mnt/data01
      ansible.posix.mount:
        path: /mnt/data01
        src: /dev/sdb
        fstype: xfs
        opts: defaults,nofail
        state: mounted
      when:
        - sdb_exists.stat.exists
        - data01_mounted.rc != 0

    # Check for second data disk /dev/sdc (index disk)
    - name: Check for /dev/sdc
      stat:
        path: /dev/sdc
      register: sdc_exists

    - name: Check if /mnt/index01 already mounted
      shell: mount | grep -q "/mnt/index01"
      register: index01_mounted
      failed_when: false
      changed_when: false

    - name: Check if /dev/sdc has filesystem
      shell: blkid /dev/sdc
      register: sdc_has_fs
      failed_when: false
      changed_when: false
      when: sdc_exists.stat.exists

    - name: Create XFS filesystem on /dev/sdc
      community.general.filesystem:
        dev: /dev/sdc
        fstype: xfs
        force: false
      when:
        - sdc_exists.stat.exists
        - sdc_has_fs.rc != 0
        - index01_mounted.rc != 0

    - name: Create /mnt/index01 directory
      file:
        path: /mnt/index01
        state: directory
        owner: root
        group: root
        mode: "0755"
      when: sdc_exists.stat.exists

    - name: Mount /dev/sdc to /mnt/index01
      ansible.posix.mount:
        path: /mnt/index01
        src: /dev/sdc
        fstype: xfs
        opts: defaults,nofail
        state: mounted
      when:
        - sdc_exists.stat.exists
        - index01_mounted.rc != 0

    - name: Display disk status
      shell: df -h | grep -E "(Filesystem|/mnt)"
      register: disk_status
      changed_when: false

    - name: Show disk status
      debug:
        var: disk_status.stdout_lines
