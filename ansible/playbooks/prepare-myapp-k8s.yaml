---
# Prepare Wallet K8s Nodes for Kubespray Deployment
# Run BEFORE Kubespray cluster.yml
#
# Usage:
#   ansible-playbook -i kubespray/inventory/myapp/hosts.yaml playbooks/prepare-myapp-k8s.yaml

- name: Prepare Wallet K8s Nodes
  hosts: all
  become: true
  gather_facts: true
  tasks:
    - name: Verify /mnt/data01 is mounted
      ansible.builtin.command: mountpoint -q /mnt/data01
      register: mount_check
      failed_when: mount_check.rc != 0
      changed_when: false

    - name: Display disk usage
      ansible.builtin.command: df -h /mnt/data01
      register: disk_usage
      changed_when: false

    - name: Show disk info
      ansible.builtin.debug:
        msg: "{{ disk_usage.stdout_lines }}"

    - name: Create Kubernetes directories on external disk
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
        owner: root
        group: root
      loop:
        - /mnt/data01/containerd
        - /mnt/data01/kubelet
        - /mnt/data01/etcd
        - /mnt/data01/local-path-provisioner

    - name: Create CNI directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /opt/cni/bin
        - /etc/cni/net.d

    - name: Disable swap (required for Kubernetes)
      ansible.builtin.command: swapoff -a
      changed_when: false

    - name: Remove swap from fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: ".*swap.*"
        state: absent

    - name: Load required kernel modules
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter

    - name: Persist kernel modules
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter
        mode: "0644"

    - name: Configure sysctl for Kubernetes networking
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_file: /etc/sysctl.d/99-kubernetes.conf
        reload: true
      loop:
        - { key: "net.bridge.bridge-nf-call-iptables", value: "1" }
        - { key: "net.bridge.bridge-nf-call-ip6tables", value: "1" }
        - { key: "net.ipv4.ip_forward", value: "1" }

    - name: Set hostname to inventory name
      ansible.builtin.hostname:
        name: "{{ inventory_hostname }}"

    - name: Update /etc/hosts with cluster nodes
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: ".*{{ hostvars[item]['ip'] }}.*"
        line: "{{ hostvars[item]['ip'] }} {{ item }}"
        state: present
      loop: "{{ groups['all'] }}"

    - name: Reboot notification
      ansible.builtin.debug:
        msg: "Node {{ inventory_hostname }} is ready for Kubespray. Reboot recommended if kernel modules were just loaded."
