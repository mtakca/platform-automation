---
- name: Ensure user exists
  user:
    name: "{{ item.name }}"
    shell: /bin/bash
    create_home: true
    state: present
  become: true

- name: Ensure .ssh directory exists
  file:
    path: "/home/{{ item.name }}/.ssh"
    state: directory
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: '0700'
  become: true

- name: Add authorized key
  authorized_key:
    user: "{{ item.name }}"
    state: present
    key: "{{ item.ssh_pubkey }}"
    manage_dir: false
  become: true

- name: Fix authorized_keys permission
  file:
    path: "/home/{{ item.name }}/.ssh/authorized_keys"
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: '0600'
  become: true

- name: Install sudoers file (optional)
  template:
    src: "sudoers.j2"
    dest: "/etc/sudoers.d/{{ item.name }}"
    owner: root
    group: root
    mode: '0440'
  when: item.sudo_nopasswd | default(false)
  become: true

# ✅ handler yerine inline doğrulama
- name: Validate sudoers file for {{ item.name }}
  command: "visudo -cf /etc/sudoers.d/{{ item.name }}"
  become: true
  ignore_errors: true
