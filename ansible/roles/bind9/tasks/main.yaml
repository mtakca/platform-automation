---
# Bind9 DNS Server Installation and Configuration
# Supports RFC2136 Dynamic Updates for ExternalDNS integration

- name: Install Bind9 packages
  ansible.builtin.apt:
    name:
      - bind9
      - bind9utils
      - bind9-doc
      - dnsutils
    state: present
    update_cache: yes

- name: Create zones directory (AppArmor-compliant path)
  ansible.builtin.file:
    path: /var/lib/bind
    state: directory
    owner: bind
    group: bind
    mode: "0775"

- name: Generate TSIG key for dynamic updates
  ansible.builtin.shell: |
    if [ ! -f /etc/bind/keys/{{ bind9_tsig_keyname }}.key ]; then
      mkdir -p /etc/bind/keys
      tsig-keygen -a {{ bind9_tsig_algorithm }} {{ bind9_tsig_keyname }} > /etc/bind/keys/{{ bind9_tsig_keyname }}.key
      chown bind:bind /etc/bind/keys/{{ bind9_tsig_keyname }}.key
      chmod 640 /etc/bind/keys/{{ bind9_tsig_keyname }}.key
    fi
  args:
    creates: /etc/bind/keys/{{ bind9_tsig_keyname }}.key

- name: Read TSIG key content
  ansible.builtin.slurp:
    src: /etc/bind/keys/{{ bind9_tsig_keyname }}.key
  register: tsig_key_content

- name: Display TSIG key (save this for ExternalDNS)
  ansible.builtin.debug:
    msg: "{{ tsig_key_content.content | b64decode }}"

- name: Configure Bind9 options
  ansible.builtin.template:
    src: named.conf.options.j2
    dest: /etc/bind/named.conf.options
    owner: bind
    group: bind
    mode: "0644"
  notify: restart bind9

- name: Configure named.conf.local with zone and key
  ansible.builtin.template:
    src: named.conf.local.j2
    dest: /etc/bind/named.conf.local
    owner: bind
    group: bind
    mode: "0644"
  notify: restart bind9

- name: Create zone file
  ansible.builtin.template:
    src: db.zone.j2
    dest: "{{ bind9_zone_file }}"
    owner: bind
    group: bind
    mode: "0644"
    force: no # Don't overwrite if exists (preserve dynamic updates)
  notify: reload bind9

- name: Ensure Bind9 is running and enabled
  ansible.builtin.service:
    name: named
    state: started
    enabled: yes

- name: Open firewall for DNS (if ufw is active)
  community.general.ufw:
    rule: allow
    port: "53"
    proto: "{{ item }}"
  loop:
    - tcp
    - udp
  ignore_errors: true

# Keepalived for VIP failover (only if bind9_vip is set)
- name: Install Keepalived
  ansible.builtin.apt:
    name: keepalived
    state: present
  when: bind9_vip | length > 0

- name: Configure Keepalived
  ansible.builtin.template:
    src: keepalived.conf.j2
    dest: /etc/keepalived/keepalived.conf
    owner: root
    group: root
    mode: "0644"
  when: bind9_vip | length > 0
  notify: restart keepalived

- name: Ensure Keepalived is running
  ansible.builtin.service:
    name: keepalived
    state: started
    enabled: yes
  when: bind9_vip | length > 0
