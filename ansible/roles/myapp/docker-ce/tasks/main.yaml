---
- name: Install prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true

- name: Create Docker GPG key directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker

- name: Get available Docker CE versions
  ansible.builtin.shell: |
    apt-cache madison docker-ce | grep "{{ docker_version }}" | head -1 | awk '{print $3}'
  register: docker_pkg_version
  changed_when: false

- name: Fail if Docker version not found
  ansible.builtin.fail:
    msg: "Docker version {{ docker_version }} not found in repository"
  when: docker_pkg_version.stdout == ""

- name: Install Docker CE packages
  ansible.builtin.apt:
    name:
      - "docker-ce={{ docker_pkg_version.stdout }}"
      - "docker-ce-cli={{ docker_pkg_version.stdout }}"
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Hold Docker packages to prevent auto-upgrade
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - docker-ce
    - docker-ce-cli
    - containerd.io
    - docker-buildx-plugin
    - docker-compose-plugin

- name: Create Docker configuration directory
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    mode: "0755"

- name: Configure Docker daemon
  ansible.builtin.template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
  notify: Restart Docker

- name: Create systemd override directory
  ansible.builtin.file:
    path: /etc/systemd/system/docker.service.d
    state: directory
    mode: "0755"

- name: Configure systemd override for Docker
  ansible.builtin.template:
    src: docker-override.conf.j2
    dest: /etc/systemd/system/docker.service.d/override.conf
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart Docker

- name: Setup userns-remap subordinate UIDs
  ansible.builtin.lineinfile:
    path: /etc/subuid
    line: "dockremap:100000:65536"
    create: true
    mode: "0644"

- name: Setup userns-remap subordinate GIDs
  ansible.builtin.lineinfile:
    path: /etc/subgid
    line: "dockremap:100000:65536"
    create: true
    mode: "0644"

- name: Ensure Docker is enabled and started
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for Docker to be ready
  ansible.builtin.command: docker info
  register: docker_info
  retries: 5
  delay: 3
  until: docker_info.rc == 0
  changed_when: false
