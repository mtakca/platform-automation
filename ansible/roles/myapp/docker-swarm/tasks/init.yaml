---
- name: Initialize Docker Swarm
  ansible.builtin.command: >
    docker swarm init --advertise-addr {{ swarm_advertise_addr }}
  register: swarm_init_result

- name: Get manager join token
  ansible.builtin.command: docker swarm join-token manager -q
  register: swarm_manager_token_result
  changed_when: false

- name: Get worker join token
  ansible.builtin.command: docker swarm join-token worker -q
  register: swarm_worker_token_result
  changed_when: false

- name: Store join tokens as facts
  ansible.builtin.set_fact:
    swarm_manager_token: "{{ swarm_manager_token_result.stdout }}"
    swarm_worker_token: "{{ swarm_worker_token_result.stdout }}"
    swarm_manager_ip: "{{ swarm_advertise_addr }}"
    cacheable: true

- name: Display join commands
  ansible.builtin.debug:
    msg: |
      Swarm initialized successfully.

      Manager join command:
      docker swarm join --token {{ swarm_manager_token_result.stdout }} {{ swarm_advertise_addr }}:2377

      Worker join command:
      docker swarm join --token {{ swarm_worker_token_result.stdout }} {{ swarm_advertise_addr }}:2377
