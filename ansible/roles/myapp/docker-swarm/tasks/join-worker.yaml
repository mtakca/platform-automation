---
- name: Get swarm init host
  ansible.builtin.set_fact:
    swarm_init_host: "{{ groups['myapp_swarm_init'][0] }}"

- name: Get worker token from init host
  ansible.builtin.command: docker swarm join-token worker -q
  delegate_to: "{{ swarm_init_host }}"
  register: worker_token_result
  changed_when: false

- name: Get init host IP
  ansible.builtin.set_fact:
    swarm_manager_ip: "{{ hostvars[swarm_init_host]['ansible_host'] }}"
    swarm_worker_token: "{{ worker_token_result.stdout }}"

- name: Check if already in swarm
  ansible.builtin.command: docker info --format '{{ "{{" }}.Swarm.LocalNodeState{{ "}}" }}'
  register: swarm_state
  changed_when: false
  failed_when: false

- name: Join swarm as worker
  ansible.builtin.command: >
    docker swarm join --token {{ swarm_worker_token }} {{ swarm_manager_ip }}:2377
  register: swarm_join_result
  when: swarm_state.stdout != 'active'
