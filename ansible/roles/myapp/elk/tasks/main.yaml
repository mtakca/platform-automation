---
# Install Docker first (standalone node)
- name: Install Docker on standalone node
  ansible.builtin.include_tasks: ../../common/tasks/install-docker.yaml

- name: Create ELK directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: myapp
    group: myapp
    mode: "0755"
  loop:
    - "{{ elk_compose_dir }}"
    - "{{ elasticsearch_data_dir }}"
    - "{{ logstash_data_dir }}"

- name: Deploy ELK docker-compose
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ elk_compose_dir }}/docker-compose.yml"
    owner: myapp
    group: myapp
    mode: "0644"
  notify: Restart ELK

- name: Start ELK stack
  community.docker.docker_compose_v2:
    project_src: "{{ elk_compose_dir }}"
    state: present
  become_user: myapp
