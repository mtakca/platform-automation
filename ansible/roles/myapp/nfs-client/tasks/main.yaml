---
- name: Install NFS client utilities
  ansible.builtin.apt:
    name: nfs-common
    state: present
    update_cache: true

- name: Create NFS mount point
  ansible.builtin.file:
    path: "{{ nfs_mount_path }}"
    state: directory
    mode: "0755"

- name: Mount NFS share
  ansible.posix.mount:
    path: "{{ nfs_mount_path }}"
    src: "{{ nfs_server_ip }}:{{ nfs_export_path }}"
    fstype: nfs4
    opts: "{{ nfs_mount_options }}"
    state: mounted

- name: Verify NFS mount
  ansible.builtin.command: mountpoint -q {{ nfs_mount_path }}
  register: nfs_mountpoint_check
  changed_when: false
  failed_when: nfs_mountpoint_check.rc != 0

- name: Create symlink if needed
  ansible.builtin.file:
    src: "{{ nfs_mount_path }}"
    dest: "{{ nfs_symlink_path }}"
    state: link
    owner: myapp
    group: myapp
  when:
    - nfs_create_symlink
    - nfs_mount_path != nfs_symlink_path
