---
- name: Install NFS client utilities
  ansible.builtin.apt:
    name: nfs-common
    state: present
    update_cache: true

- name: Create NFS mount point
  ansible.builtin.file:
    path: "{{ nfs_mount_path }}"
    state: directory
    mode: "0755"

- name: Mount NFS share
  ansible.posix.mount:
    path: "{{ nfs_mount_path }}"
    src: "{{ nfs_server_ip }}:{{ nfs_export_path }}"
    fstype: nfs
    opts: rw,hard,intr,nfsvers=4
    state: mounted

- name: Add NFS mount to fstab
  ansible.posix.mount:
    path: "{{ nfs_mount_path }}"
    src: "{{ nfs_server_ip }}:{{ nfs_export_path }}"
    fstype: nfs
    opts: rw,hard,intr,nfsvers=4
    state: present
