---
# RKE2 HA Role Defaults
# Override these in inventory/group_vars as needed

# RKE2 Version (pinned)
rke2_version: "v1.28.15+rke2r1"

# CNI Plugin
cni_plugin: "calico"

# Components to disable
disable_components:
  - rke2-ingress-nginx

# kube-vip Configuration
kube_vip_image: "ghcr.io/kube-vip/kube-vip:v0.8.7"
kube_vip_enable_svc: false

# Optional: set to a fixed NIC if you want (otherwise auto: ansible_default_ipv4.interface)
kube_vip_interface: ""
